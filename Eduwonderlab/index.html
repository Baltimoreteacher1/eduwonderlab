<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. Neft • CCSS Hub</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="hub-header">
    <div class="hub-title" id="siteTitle">Mr. Neft • CCSS Hub</div>
    <div class="hub-sub">Search, filter, and launch games/resources.</div>

    <div class="hub-controls">
      <input id="q" class="hub-input" placeholder="Search (e.g., inequalities, 6.EE, number line)..." />
      <select id="type" class="hub-input">
        <option value="">All Types</option>
        <option value="game">Games</option>
        <option value="resource">Resources</option>
      </select>
      <select id="unit" class="hub-input">
        <option value="">All Units</option>
      </select>
      <select id="ccss" class="hub-input">
        <option value="">All CCSS</option>
      </select>
      <button id="resetBtn" class="hub-btn">Reset</button>
    </div>
  </header>

  <main id="app" class="hub-main"></main>

  <script src="/app.js"></script>
</body>
</html>
